name: Run Stock Screener

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: python stock_screener.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json docs/data/stats.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update screener results"
            git push
          fi

      - name: Check if first weekday of month
        id: check-date
        run: |
          DAY=$(date +%d)
          DOW=$(date +%u)
          if [ "$DAY" -le 7 ] && [ "$DOW" -le 5 ]; then
            echo "is_first_weekday=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_first_weekday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit monthly snapshot
        if: steps.check-date.outputs.is_first_weekday == 'true'
        env:
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
        run: |
          # Min-row guard (DATA-02) is upstream: write_json() exits non-zero
          # when < 100 rows, which fails the "Run screener" step above and
          # prevents this step from ever running on an incomplete dataset.
          SNAP_DATE=$(date +%Y-%m-%d)
          mkdir -p docs/data/snapshots
          cp docs/data/results.json "docs/data/snapshots/${SNAP_DATE}.json"
          python -c "import stock_screener; stock_screener.update_snapshot_manifest('${SNAP_DATE}.json')"
          git add "docs/data/snapshots/${SNAP_DATE}.json" docs/data/snapshots/index.json docs/data/stats.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: monthly snapshot ${SNAP_DATE}"
            git push
          fi
