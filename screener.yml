name: Run Stock Screener

on:
  # Run automatically every weekday at 6am ET (11:00 UTC)
  schedule:
    - cron: "0 11 * * 1-5"

  # Also allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          TIINGO_API_KEYS:     ${{ secrets.TIINGO_API_KEYS }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
          # FMP_API_KEYS:      ${{ secrets.FMP_API_KEYS }}  # reserved for future use
          GSHEET_CREDS_JSON:   ${{ secrets.GSHEET_CREDS_JSON }}
          GSHEET_SPREADSHEET:  ${{ secrets.GSHEET_SPREADSHEET }}
          GSHEET_WORKSHEET:    ${{ secrets.GSHEET_WORKSHEET }}
        run: python stock_screener.py